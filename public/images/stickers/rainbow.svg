<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="rain-gloss" cx="30%" cy="20%" r="28%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="rain-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dy="1.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#rain-shadow)" stroke="#ffffff" stroke-width="1.5" fill="none">
    <!-- arcs -->
    <path d="M8 60 A 32 32 0 0 1 72 60" stroke="#bf5a7a" stroke-width="7"/>
    <path d="M14 60 A 26 26 0 0 1 66 60" stroke="#cb7836" stroke-width="7"/>
    <path d="M20 60 A 20 20 0 0 1 60 60" stroke="#f0c774" stroke-width="7"/>
    <path d="M26 60 A 14 14 0 0 1 54 60" stroke="#3c9b60" stroke-width="7"/>
    <path d="M32 60 A 8 8 0 0 1 48 60" stroke="#168b9d" stroke-width="7"/>
  </g>
  <g filter="url(#rain-shadow)">
    <!-- clouds -->
    <ellipse cx="12" cy="62" rx="10" ry="7" fill="#ffffff" stroke="#dcd5c2" stroke-width="1.5"/>
    <ellipse cx="68" cy="62" rx="10" ry="7" fill="#ffffff" stroke="#dcd5c2" stroke-width="1.5"/>
    <circle cx="8" cy="58" r="5" fill="#ffffff" stroke="#dcd5c2" stroke-width="1.5"/>
    <circle cx="72" cy="58" r="5" fill="#ffffff" stroke="#dcd5c2" stroke-width="1.5"/>
  </g>
  <!-- top gloss highlight over the top arc -->
  <path d="M20 38 Q 40 32 60 38" stroke="url(#rain-gloss)" stroke-width="3" fill="none" opacity="0.7"/>
</svg>

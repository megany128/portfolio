<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="smile-body" cx="35%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#d6f0f4"/>
      <stop offset="55%" stop-color="#65b6c3"/>
      <stop offset="100%" stop-color="#0f6b7a"/>
    </radialGradient>
    <radialGradient id="smile-gloss" cx="30%" cy="25%" r="26%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="smile-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dy="1.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#smile-shadow)">
    <circle cx="40" cy="40" r="32" fill="url(#smile-body)" stroke="#ffffff" stroke-width="3"/>
    <!-- eyes -->
    <circle cx="30" cy="34" r="3.5" fill="#242424"/>
    <circle cx="50" cy="34" r="3.5" fill="#242424"/>
    <circle cx="31" cy="33" r="1" fill="#ffffff"/>
    <circle cx="51" cy="33" r="1" fill="#ffffff"/>
    <!-- smile -->
    <path d="M26 46 Q 40 60 54 46" stroke="#242424" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- blush -->
    <ellipse cx="24" cy="46" rx="3" ry="2" fill="#e599b1" opacity="0.8"/>
    <ellipse cx="56" cy="46" rx="3" ry="2" fill="#e599b1" opacity="0.8"/>
    <!-- gloss -->
    <ellipse cx="28" cy="22" rx="11" ry="6" fill="url(#smile-gloss)" transform="rotate(-28 28 22)"/>
    <circle cx="52" cy="20" r="2" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>

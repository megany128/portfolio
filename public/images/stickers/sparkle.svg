<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="spark-body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#fff1b2"/>
      <stop offset="100%" stop-color="#cb7836"/>
    </radialGradient>
    <radialGradient id="spark-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#fff1b2" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="spark-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dy="1.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#spark-shadow)">
    <circle cx="40" cy="40" r="22" fill="url(#spark-center)" opacity="0.7"/>
    <!-- 4-point sparkle -->
    <path d="M40 6 L 45 34 L 74 40 L 45 46 L 40 74 L 35 46 L 6 40 L 35 34 Z"
      fill="url(#spark-body)" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
    <!-- small cross -->
    <path d="M63 18 L 65 26 L 73 28 L 65 30 L 63 38 L 61 30 L 53 28 L 61 26 Z"
      fill="#ffffff" opacity="0.9"/>
    <circle cx="40" cy="38" r="3" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>

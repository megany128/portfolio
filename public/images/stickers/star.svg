<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="star-body" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#ffe3a8"/>
      <stop offset="55%" stop-color="#e3a06b"/>
      <stop offset="100%" stop-color="#a85a24"/>
    </radialGradient>
    <radialGradient id="star-gloss" cx="35%" cy="28%" r="24%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="star-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dy="1.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#star-shadow)">
    <polygon
      points="40,8 48.5,30 72,32 53.5,47 60,70 40,57 20,70 26.5,47 8,32 31.5,30"
      fill="url(#star-body)" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
    <ellipse cx="30" cy="26" rx="9" ry="5" fill="url(#star-gloss)" transform="rotate(-22 30 26)"/>
    <circle cx="48" cy="22" r="1.8" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>

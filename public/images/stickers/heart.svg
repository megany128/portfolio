<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="heart-body" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#f2b7c8"/>
      <stop offset="55%" stop-color="#bf5a7a"/>
      <stop offset="100%" stop-color="#8a3f58"/>
    </radialGradient>
    <radialGradient id="heart-gloss" cx="30%" cy="25%" r="22%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="heart-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dy="1.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#heart-shadow)">
    <path d="M40 66 C 16 50, 8 36, 14 24 C 20 14, 34 14, 40 26 C 46 14, 60 14, 66 24 C 72 36, 64 50, 40 66 Z"
      fill="url(#heart-body)" stroke="#ffffff" stroke-width="2.5"/>
    <ellipse cx="28" cy="28" rx="10" ry="6" fill="url(#heart-gloss)" transform="rotate(-28 28 28)"/>
    <circle cx="50" cy="36" r="2" fill="#ffffff" opacity="0.85"/>
  </g>
</svg>

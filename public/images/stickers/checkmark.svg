    <path d="M24 42 L 35 54 L 57 28"
      stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="30" cy="26" rx="10" ry="5" fill="url(#check-gloss)" transform="rotate(-25 30 26)"/>
    <circle cx="54" cy="22" r="2" fill="#ffffff" opacity="0.85"/>
  </g>
</svg>

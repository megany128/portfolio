<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="check-body" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#c9ebd5"/>
      <stop offset="55%" stop-color="#3c9b60"/>
      <stop offset="100%" stop-color="#15632f"/>
    </radialGradient>
    <radialGradient id="check-gloss" cx="30%" cy="25%" r="25%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="check-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dy="1.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#check-shadow)">

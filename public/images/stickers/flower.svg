<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <radialGradient id="petal-body" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffe5ee"/>
      <stop offset="55%" stop-color="#e599b1"/>
      <stop offset="100%" stop-color="#bf5a7a"/>
    </radialGradient>
    <radialGradient id="flower-core" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fff1b2"/>
      <stop offset="70%" stop-color="#e3a06b"/>
      <stop offset="100%" stop-color="#a85a24"/>
    </radialGradient>
    <filter id="flower-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.4"/>
      <feOffset dy="1.8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#flower-shadow)">
    <g stroke="#ffffff" stroke-width="2" fill="url(#petal-body)">
      <ellipse cx="40" cy="18" rx="11" ry="15"/>
      <ellipse cx="40" cy="62" rx="11" ry="15"/>
      <ellipse cx="18" cy="40" rx="15" ry="11"/>
      <ellipse cx="62" cy="40" rx="15" ry="11"/>
      <ellipse cx="25" cy="25" rx="11" ry="13" transform="rotate(-45 25 25)"/>
      <ellipse cx="55" cy="55" rx="11" ry="13" transform="rotate(-45 55 55)"/>
      <ellipse cx="55" cy="25" rx="13" ry="11" transform="rotate(-45 55 25)"/>
      <ellipse cx="25" cy="55" rx="13" ry="11" transform="rotate(-45 25 55)"/>
    </g>
    <circle cx="40" cy="40" r="11" fill="url(#flower-core)" stroke="#ffffff" stroke-width="2"/>
    <circle cx="37" cy="37" r="3" fill="#ffffff" opacity="0.7"/>
  </g>
</svg>
